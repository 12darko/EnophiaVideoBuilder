; ============================================================
; Supervisord — MoneyPrinterTurbo Process Manager
; Streamlit WebUI + FastAPI Backend
; ============================================================

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
logfile_maxbytes=10MB
logfile_backups=3

; ── Streamlit WebUI ──────────────────────────────────────────
; NOT: Streamlit PUBLIC port'ta (8080) çalışır. Coolify domaini bu porta
; yönlendirdiği için (kendi DB kaydı), UI'ı buraya koyduk. FastAPI 8081'e
; taşındı (sadece ai-agent iç ağdan kullanır).
[program:streamlit]
command=streamlit run ./webui/Main.py
    --server.port=8080
    --server.address=0.0.0.0
    --server.headless=true
    --browser.gatherUsageStats=false
    --server.enableCORS=false
    --server.enableXsrfProtection=false
    --server.enableWebsocketCompression=false
directory=/MoneyPrinterTurbo
autostart=true
autorestart=true
startsecs=10
startretries=5
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/MoneyPrinterTurbo"

; ── UI Köprüsü: 8501 → 8080 ──────────────────────────────────
; Coolify router'ı eski kurulumdan 8501'e takılı kalmış olabilir. Bu köprü,
; 8501'e gelen her şeyi (WebSocket dahil) Streamlit'e (8080) iletir.
; Böylece Coolify ister 8080 ister 8501'e yönlendirsin, UI hep açılır.
[program:ui-proxy]
command=socat TCP-LISTEN:8501,fork,reuseaddr TCP:127.0.0.1:8080
autostart=true
autorestart=true
startsecs=3
startretries=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── FastAPI Backend ──────────────────────────────────────────
; Sadece iç ağ (ai-agent → http://video-generator:8081). Public DEĞİL.
[program:fastapi]
command=uvicorn app.asgi:app --host 0.0.0.0 --port 8081 --workers 2
directory=/MoneyPrinterTurbo
autostart=true
autorestart=true
startsecs=5
startretries=5
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/MoneyPrinterTurbo"
