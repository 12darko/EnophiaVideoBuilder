; ============================================================
; Supervisord — MoneyPrinterTurbo Process Manager
; Streamlit WebUI + FastAPI Backend
; ============================================================

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
logfile_maxbytes=10MB
logfile_backups=3

; ── Streamlit WebUI ──────────────────────────────────────────
[program:streamlit]
command=streamlit run ./webui/Main.py
    --server.port=8501
    --server.address=0.0.0.0
    --browser.gatherUsageStats=false
    --server.enableCORS=false
    --server.enableXsrfProtection=false
directory=/MoneyPrinterTurbo
autostart=true
autorestart=true
startsecs=10
startretries=5
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/MoneyPrinterTurbo"

; ── FastAPI Backend ──────────────────────────────────────────
[program:fastapi]
command=uvicorn app.asgi:app --host 0.0.0.0 --port 8080 --workers 2
directory=/MoneyPrinterTurbo
autostart=true
autorestart=true
startsecs=5
startretries=5
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/MoneyPrinterTurbo"
