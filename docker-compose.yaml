# ============================================================
# Otonom Video Fabrikası — Coolify Docker Compose
# ============================================================
# İki katmanlı mimari:
#   1. video-generator: MoneyPrinterTurbo (Streamlit + FastAPI)
#   2. ai-agent: Otonom yapay zeka ajanı (7/24)
#
# Coolify arayüzünde "Docker Compose" olarak deploy edin.
# ============================================================

services:
  # ─── Katman 1: Video Üretim Motoru ────────────────────────
  video-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moneyprinterturbo
    restart: unless-stopped

    # ÖNEMLİ: Coolify domaini 8080'e yönlendiriyor (kendi DB kaydı). Bu yüzden
    # Streamlit UI'ı 8080'e koyduk; domain → 8080 → Streamlit olur.
    # FastAPI 8081'e taşındı (sadece iç ağ, ai-agent kullanır).
    expose:
      - "8080"

    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONPATH=/MoneyPrinterTurbo
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Istanbul

      # ── API anahtarları (env → config.toml, redeploy'da KALICI) ──
      # Bunları doldurursan UI'dan girmene gerek yok ve asla silinmez.
      # Video kaynakları:
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
      - PIXABAY_API_KEY=${PIXABAY_API_KEY:-}
      - COVERR_API_KEY=${COVERR_API_KEY:-}
      - VIDEO_SOURCE=${VIDEO_SOURCE:-pexels}
      # LLM sağlayıcılar (hangisini doldurursan o kullanılır):
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME:-gemini-2.0-flash}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL_NAME=${GROQ_MODEL_NAME:-llama-3.3-70b-versatile}
      # Birden fazla LLM key'i varsa hangisi aktif olsun (gemini/groq/...):
      - MPT_LLM_PROVIDER=${MPT_LLM_PROVIDER:-}

      # MPT UI'da gösterilecek "Agent Paneli" linki (opsiyonel)
      - PANEL_URL=${PANEL_URL:-}

    volumes:
      # ── Kalıcı config ──
      - vg_config:/MoneyPrinterTurbo/config_data

      # ── Üretilen videolar (agent ile paylaşılan) ──
      - shared_output:/MoneyPrinterTurbo/output

      # ── İndirilen stok videolar ──
      - vg_storage:/MoneyPrinterTurbo/storage

      # ── Müzik dosyaları ──
      - vg_songs:/MoneyPrinterTurbo/resource/songs

      # ── Stok video kaynakları ──
      - vg_videos:/MoneyPrinterTurbo/resource/videos

    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "3.0"
        reservations:
          memory: 1G
          cpus: "1.0"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - factory-net

  # ─── Katman 2: Otonom AI Agent ────────────────────────────
  ai-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: video-agent
    restart: unless-stopped

    # Web kontrol paneli (durum + video yönetimi + manuel tetikleme).
    # expose: yalnızca iç Docker ağına açar (internete DEĞİL).
    expose:
      - "8090"
    # ── Panele DIŞARIDAN erişim isteyenler için ──────────────
    # SEÇENEK 1 (Coolify): ai-agent servisine FQDN ekle:
    #   https://panel.domainin.com:8090   (PANEL_PASSWORD + Basic Auth ŞART)
    #
    # SEÇENEK 2 (sunucu IP'sinden tarayıcıyla): aşağıyı aç → http://SUNUCU_IP:8090
    #   ⚠️ Önce mutlaka PANEL_PASSWORD koy (yoksa herkese açık olur)!
    # ports:
    #   - "8090:8090"
    #
    # SEÇENEK 3 (sadece host'taki Hermes erişsin, internete kapalı):
    # ports:
    #   - "127.0.0.1:8090:8090"

    depends_on:
      video-generator:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started

    # Container'dan host'a (Hermes API server) erişim için.
    # Linux'ta host.docker.internal'i host ağ geçidine map'ler.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      # ── Video Generator bağlantısı ──
      # FastAPI 8081'e taşındı (8080'i Streamlit UI aldı, Coolify oraya yönlendiriyor)
      - VG_API_BASE_URL=http://video-generator:8081
      - VG_HEALTH_CHECK_URL=http://video-generator:8080/_stcore/health
      - VG_API_TIMEOUT=600
      - VG_DEFAULT_ASPECT=9:16
      - VG_DEFAULT_VOICE=tr-TR-EmelNeural
      - VG_DEFAULT_VIDEO_SOURCE=pexels

      # ── LLM Ayarları ──
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gemini-2.0-flash}
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY:-}
      - LLM_OPENAI_BASE_URL=${LLM_OPENAI_BASE_URL:-https://api.openai.com/v1}
      - LLM_OPENAI_MODEL_NAME=${LLM_OPENAI_MODEL_NAME:-gpt-4o-mini}

      # ── Zamanlama ──
      - SCHEDULER_DAILY_VIDEO_COUNT=${SCHEDULER_DAILY_VIDEO_COUNT:-3}
      - SCHEDULER_PRODUCTION_HOURS=${SCHEDULER_PRODUCTION_HOURS:-9,14,19}
      - SCHEDULER_POST_DELAY_MINUTES=${SCHEDULER_POST_DELAY_MINUTES:-5}
      - SCHEDULER_MIN_INTERVAL_MINUTES=${SCHEDULER_MIN_INTERVAL_MINUTES:-60}

      # ── İçerik Stratejisi ──
      - CONTENT_LANGUAGE=${CONTENT_LANGUAGE:-tr}
      - CONTENT_NICHE=${CONTENT_NICHE:-motivation}
      - CONTENT_TOPIC_POOL=${CONTENT_TOPIC_POOL:-}
      - CONTENT_TARGET_DURATION_SECONDS=${CONTENT_TARGET_DURATION_SECONDS:-60}

      # ── Sosyal Medya ──
      - SOCIAL_ENABLED_PLATFORMS=${SOCIAL_ENABLED_PLATFORMS:-tiktok,instagram,youtube}
      - SOCIAL_PUBLISH_STRATEGY=${SOCIAL_PUBLISH_STRATEGY:-hybrid}
      - SOCIAL_TIKTOK_SESSION_COOKIE=${SOCIAL_TIKTOK_SESSION_COOKIE:-}
      - SOCIAL_INSTAGRAM_USERNAME=${SOCIAL_INSTAGRAM_USERNAME:-}
      - SOCIAL_INSTAGRAM_PASSWORD=${SOCIAL_INSTAGRAM_PASSWORD:-}
      - SOCIAL_YOUTUBE_CLIENT_ID=${SOCIAL_YOUTUBE_CLIENT_ID:-}
      - SOCIAL_YOUTUBE_CLIENT_SECRET=${SOCIAL_YOUTUBE_CLIENT_SECRET:-}
      - SOCIAL_YOUTUBE_REFRESH_TOKEN=${SOCIAL_YOUTUBE_REFRESH_TOKEN:-}
      - SOCIAL_DEFAULT_HASHTAGS=${SOCIAL_DEFAULT_HASHTAGS:-#shorts,#viral,#ai,#fyp}

      # ── Self-Healing ──
      - HEAL_MAX_RETRIES=${HEAL_MAX_RETRIES:-5}
      - HEAL_INITIAL_BACKOFF_SECONDS=${HEAL_INITIAL_BACKOFF_SECONDS:-30}
      - HEAL_MAX_BACKOFF_SECONDS=${HEAL_MAX_BACKOFF_SECONDS:-600}
      - HEAL_OOM_COOLDOWN_SECONDS=${HEAL_OOM_COOLDOWN_SECONDS:-300}

      # ── Bildirimler ──
      - NOTIFY_ENABLED=${NOTIFY_ENABLED:-false}
      - NOTIFY_TELEGRAM_BOT_TOKEN=${NOTIFY_TELEGRAM_BOT_TOKEN:-}
      - NOTIFY_TELEGRAM_CHAT_ID=${NOTIFY_TELEGRAM_CHAT_ID:-}

      # ── Self-Healing için Docker log erişimi (proxy üzerinden) ──
      # Doğrudan docker.sock mount edilmez; sadece okuma yetkili proxy.
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - HEAL_TARGET_CONTAINER_NAME=${HEAL_TARGET_CONTAINER_NAME:-moneyprinterturbo}

      # ── Depolama / Otomatik Temizlik ──
      - STORAGE_RETENTION_DAYS=${STORAGE_RETENTION_DAYS:-7}
      - STORAGE_MAX_STORAGE_GB=${STORAGE_MAX_STORAGE_GB:-0}

      # ── Web Kontrol Paneli ──
      - PANEL_ENABLED=${PANEL_ENABLED:-true}
      - PANEL_PORT=8090
      - PANEL_USERNAME=${PANEL_USERNAME:-admin}
      - PANEL_PASSWORD=${PANEL_PASSWORD:-}

      # ── Hermes Sohbeti (panel chat → hermes servisi, Docker ağı içinden) ──
      # Hermes artık compose'ta bir servis (aşağıda). Panel ona container
      # adıyla ulaşır; host/firewall derdi yok.
      - HERMES_ENABLED=${HERMES_ENABLED:-true}
      - HERMES_API_URL=${HERMES_API_URL:-http://hermes:8642/v1/chat/completions}
      - HERMES_API_KEY=${HERMES_API_KEY:-}
      - HERMES_MODEL=${HERMES_MODEL:-hermes-agent}

      # ── Agent Genel ──
      - AGENT_HEARTBEAT_INTERVAL_SECONDS=30
      - AGENT_RUN_ON_START=${AGENT_RUN_ON_START:-false}
      - TZ=Europe/Istanbul
      - PYTHONUNBUFFERED=1

    volumes:
      # ── Agent kalıcı verileri ──
      - agent_data:/agent/data

      # ── Agent logları ──
      - agent_logs:/agent/logs

      # ── Paylaşılan output (video-generator ile ortak) ──
      # rw: agent video listeleme/silme ve otomatik temizlik yapar
      - shared_output:/shared_output

      # NOT: Docker socket artık doğrudan mount EDİLMEZ.
      # Log okuma, salt-okunur docker-socket-proxy üzerinden yapılır.

    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/agent/data/heartbeat') else 1)"]
      interval: 60s
      timeout: 10s
      start_period: 60s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - factory-net

  # ─── Katman 3: Docker Socket Proxy (güvenlik) ─────────────
  # ai-agent'a host docker.sock'u doğrudan vermek yerine sadece
  # salt-okunur container/log erişimi sağlar. POST kapalı →
  # container oluşturma/durdurma/exec engellenir.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: video-docker-proxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1   # /containers (GET) — log okuma için gerekli
      - IMAGES=0
      - NETWORKS=0
      - VOLUMES=0
      - SERVICES=0
      - TASKS=0
      - POST=0         # tüm yazma/mutasyon işlemleri yasak
      - EXEC=0
      - INFO=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - factory-net

  # ─── Katman 4: Hermes Ajanı (sohbet + kontrol beyni) ──────
  # Resmi nousresearch/hermes-agent image'ı. Panel buraya
  # http://hermes:8642 üzerinden bağlanır. Beyin: Groq.
  # init servisi, ilk açılışta Groq modelini seçen config.yaml'ı
  # volume'a yazar (varsa dokunmaz) — interaktif kuruluma gerek kalmaz.
  hermes-init:
    image: busybox:1.36
    container_name: video-hermes-init
    command:
      - sh
      - -c
      - "mkdir -p /opt/data; [ -f /opt/data/config.yaml ] || printf 'model:\\n  provider: groq\\n  default: llama-3.3-70b-versatile\\n' > /opt/data/config.yaml; echo hermes-config-hazir"
    volumes:
      - hermes_data:/opt/data
    networks:
      - factory-net
    restart: "no"

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: video-hermes
    restart: unless-stopped
    command: gateway run
    depends_on:
      hermes-init:
        condition: service_completed_successfully

    # Sadece iç ağ — panel container adıyla erişir, internete açılmaz
    expose:
      - "8642"

    environment:
      # OpenAI-uyumlu API server (panel buraya konuşur)
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${HERMES_API_KEY:-}
      - API_SERVER_CORS_ORIGINS=*
      # Beyin: Groq (MPT ile aynı anahtar)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_BASE_URL=${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      - TZ=Europe/Istanbul

    volumes:
      - hermes_data:/opt/data

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - factory-net

# ── Shared Network ──────────────────────────────────────────
networks:
  factory-net:
    driver: bridge

# ── Named Volumes ───────────────────────────────────────────
volumes:
  vg_config:
    driver: local
  shared_output:
    driver: local
  vg_storage:
    driver: local
  vg_songs:
    driver: local
  vg_videos:
    driver: local
  agent_data:
    driver: local
  agent_logs:
    driver: local
  hermes_data:
    driver: local
